name: Frontend validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/forumClient

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: Frontend/forumClient/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npx ng lint

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npx ng build --configuration production