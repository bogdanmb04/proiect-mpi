version: 2
updates:
  # Angular (npm)
  - package-ecosystem: "npm"
    directory: "/Frontend/forumClient"
    schedule:
      interval: "weekly"
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-eslint/*"

  # .NET (nuget)
  - package-ecosystem: "nuget"
    directory: "/Backend/ForumAPI/ForumAPI"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"